name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────────────────
  # Backend (PHPUnit) — G7 코어 위에서 모듈 테스트 실행
  # ─────────────────────────────────────────────────────
  backend:
    name: Backend Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: g7_testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']

    steps:
      - name: Checkout module
        uses: actions/checkout@v4
        with:
          path: module

      - name: Checkout G7 core
        uses: actions/checkout@v4
        with:
          repository: gnuboard/g7
          path: g7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: >-
            bcmath, ctype, curl, dom, exif, fileinfo, filter, gd,
            intl, json, mbstring, openssl, pcntl, pdo, pdo_mysql,
            posix, session, simplexml, sodium, tokenizer, xml,
            xmlwriter, zip
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        working-directory: g7
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ matrix.php }}-${{ hashFiles('g7/composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install G7 core dependencies
        working-directory: g7
        run: composer install --no-interaction --prefer-dist

      - name: Install module into G7
        run: |
          # 서드파티 모듈은 modules/ 하위에 설치 (_bundled/는 코어 번들 모듈 전용)
          mkdir -p g7/modules
          ln -s "$GITHUB_WORKSPACE/module" g7/modules/yjsoft-attendance

      - name: Register module autoload
        working-directory: g7
        run: |
          # composer.json에 모듈 PSR-4 네임스페이스 추가
          php -r "
            \$json = json_decode(file_get_contents('composer.json'), true);
            \$json['autoload']['psr-4']['Modules\\\\Yjsoft\\\\Attendance\\\\'] = 'modules/yjsoft-attendance/src/';
            \$json['autoload-dev']['psr-4']['Modules\\\\Yjsoft\\\\Attendance\\\\Tests\\\\'] = 'modules/yjsoft-attendance/tests/';
            file_put_contents('composer.json', json_encode(\$json, JSON_PRETTY_PRINT | JSON_UNESCAPED_SLASHES));
          "
          composer dump-autoload

      - name: Prepare environment
        working-directory: g7
        run: |
          cp .env.example .env || true
          php artisan key:generate --ansi

      - name: Configure MySQL for testing
        working-directory: g7
        run: |
          # .env.testing 생성 (G7 코어 bootstrap.php가 필수로 요구)
          cp .env.testing.example .env.testing
          # MySQL 접속 정보 설정
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=mysql/' .env.testing
          sed -i 's/^DB_DATABASE=.*/DB_DATABASE=g7_testing/' .env.testing
          sed -i 's/^DB_WRITE_DATABASE=.*/DB_WRITE_DATABASE=g7_testing/' .env.testing
          sed -i 's/^DB_READ_DATABASE=.*/DB_READ_DATABASE=g7_testing/' .env.testing
          sed -i 's/^DB_WRITE_HOST=.*/DB_WRITE_HOST=127.0.0.1/' .env.testing
          sed -i 's/^DB_WRITE_PORT=.*/DB_WRITE_PORT=3306/' .env.testing
          sed -i 's/^DB_WRITE_USERNAME=.*/DB_WRITE_USERNAME=root/' .env.testing
          sed -i 's/^DB_WRITE_PASSWORD=.*/DB_WRITE_PASSWORD=password/' .env.testing
          sed -i 's/^DB_READ_HOST=.*/DB_READ_HOST=127.0.0.1/' .env.testing
          sed -i 's/^DB_READ_PORT=.*/DB_READ_PORT=3306/' .env.testing
          sed -i 's/^DB_READ_USERNAME=.*/DB_READ_USERNAME=root/' .env.testing
          sed -i 's/^DB_READ_PASSWORD=.*/DB_READ_PASSWORD=password/' .env.testing
          # APP_KEY 설정 (base64 키에 / 가 포함되므로 # 구분자 사용)
          APP_KEY=$(grep '^APP_KEY=' .env | head -1)
          sed -i "s#^APP_KEY=.*#$APP_KEY#" .env.testing

      - name: Run backend tests
        working-directory: g7
        run: |
          php vendor/bin/phpunit modules/yjsoft-attendance/tests \
            --colors=always \
            --testdox

  # ─────────────────────────────────────────────────────
  # Frontend (Vitest) — 모듈 레이아웃 렌더링 테스트
  # ─────────────────────────────────────────────────────
  frontend:
    name: Frontend Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']

    steps:
      - name: Checkout module
        uses: actions/checkout@v4
        with:
          path: module

      - name: Checkout G7 core
        uses: actions/checkout@v4
        with:
          repository: gnuboard/g7
          path: g7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install module into G7
        run: |
          mkdir -p g7/modules
          ln -s "$GITHUB_WORKSPACE/module" g7/modules/yjsoft-attendance

      - name: Cache G7 core npm dependencies
        uses: actions/cache@v4
        with:
          path: g7/node_modules
          key: g7-npm-${{ matrix.node }}-${{ hashFiles('g7/package-lock.json') }}
          restore-keys: g7-npm-${{ matrix.node }}-

      - name: Install G7 core npm dependencies
        working-directory: g7
        run: npm ci

      - name: Cache module npm dependencies
        uses: actions/cache@v4
        with:
          path: module/node_modules
          key: module-npm-${{ matrix.node }}-${{ hashFiles('module/package.json') }}
          restore-keys: module-npm-${{ matrix.node }}-

      - name: Install module npm dependencies
        working-directory: module
        run: npm install

      - name: Run frontend tests
        working-directory: g7/modules/yjsoft-attendance
        run: npx vitest run --reporter=verbose

  # ─────────────────────────────────────────────────────
  # Frontend Build — Vite 빌드 검증
  # ─────────────────────────────────────────────────────
  build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout module
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
